<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HeroShot OG Card Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1200px; height: 630px; background: linear-gradient(135deg, #0D223A 0%, #1E5A99 50%, #2E8AE6 100%); font-family: 'Inter', -apple-system, sans-serif; color: #fff; overflow: hidden; }
        .container { width: 1200px; height: 630px; display: grid; grid-template-columns: 1.1fr 0.9fr; align-items: center; padding: 60px; gap: 40px; position: relative; }
        .left h1 { font-size: 68px; line-height: 1.05; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 22px; }
        .left h1 .accent { background: linear-gradient(135deg, #fff, #BCDFFF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .left p { font-size: 22px; line-height: 1.4; opacity: 0.88; max-width: 540px; margin-bottom: 28px; }
        .badges { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge { background: rgba(255,255,255,0.13); padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 600; backdrop-filter: blur(10px); }
        .right { position: relative; height: 100%; display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 12px; height: calc(50% - 6px); }
        .row img { flex: 1; width: 50%; height: 100%; object-fit: cover; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .logo { position: absolute; bottom: 28px; left: 60px; display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; }
        .logo-mark { width: 36px; height: 36px; background: #fff; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; color: #2E8AE6; font-size: 22px; }
        .domain { position: absolute; bottom: 28px; right: 60px; font-size: 18px; font-weight: 600; opacity: 0.85; }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>1 phone photo →<br><span class="accent">50 marketing assets.</span></h1>
        <p>iOS-first AI photo + video studio for marketplace sellers. Built for Shopify, Amazon, TikTok Shop & Noon.</p>
        <div class="badges">
            <span class="badge">📸 AI hero shots</span>
            <span class="badge">🎬 AI video</span>
            <span class="badge">⚡ 60 seconds</span>
            <span class="badge">🛍 Multi-marketplace</span>
        </div>
    </div>

    <div class="right">
        <div class="row">
            <img src="hero_studio.png" alt="">
            <img src="lifestyle_apartment.png" alt="">
        </div>
        <div class="row">
            <img src="perfume.png" alt="">
            <img src="candle.png" alt="">
        </div>
    </div>

    <div class="logo">
        <span class="logo-mark">📸</span>
        HeroShot
    </div>
    <div class="domain">heroshot.app</div>
</div>

</body>
</html>
